<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free SAT Practice — Prepxa</title>
  <meta name="description" content="Free SAT practice with original Prepxa-written questions: instant explanations, a customizable question bank, and timed module tests." />
  <meta name="theme-color" content="#0B0D14" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230B0D14'/><text x='40' y='70' font-size='56' font-family='Helvetica,Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle'>P</text><g stroke='%23F59E0B' stroke-width='7' stroke-linecap='round'><line x1='60' y1='56' x2='86' y2='82'/><line x1='60' y1='82' x2='86' y2='56'/><line x1='86' y1='56' x2='74' y2='57'/><line x1='86' y1='56' x2='85' y2='68'/></g></svg>" /><rect width='100' height='100' rx='26' fill='%234F46E5'/><text x='50' y='73' font-size='62' font-family='Helvetica,Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle'>P</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
:root{
  --bg:#0B0D14; --surface:#151823; --surface-2:#1C1F2A; --border:rgba(255,255,255,0.08);
  --text:#F3F4F6; --muted:#9CA3AF; --faint:#6B7280;
  --indigo:#4F46E5; --indigo-bright:#818CF8; --amber:#F59E0B; --success:#34D399; --error:#F87171;
  --r:14px; --rl:18px;
  --head:"Sora",-apple-system,BlinkMacSystemFont,sans-serif;
  --body:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--indigo-bright);text-decoration:none}
.nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(11,13,20,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--head);font-weight:800;font-size:20px;color:var(--text)}
.nav-logo span{color:var(--indigo-bright)}
.nav a.back{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--indigo-bright);display:block;margin-bottom:10px}
h1{font-family:var(--head);font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-0.02em;line-height:1.1}
h2{font-family:var(--head);font-size:20px;font-weight:700;margin-bottom:4px}
.sub{color:var(--muted);margin:10px 0 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.mode-card{display:flex;gap:16px;align-items:flex-start;cursor:pointer;transition:border-color .2s,transform .2s;margin-bottom:14px;text-align:left;width:100%;color:inherit}
.mode-card:hover{border-color:rgba(129,140,248,.5);transform:translateY(-2px)}
.mode-ic{flex:0 0 auto;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--head);font-weight:700;font-size:15px;padding:14px 22px;border-radius:var(--r);background:var(--indigo);color:#fff;border:none;cursor:pointer;transition:background .2s,transform .2s;width:100%}
.btn:hover{background:#5B54F0;transform:translateY(-1px)}
.btn:disabled{background:#2A2D3A;color:var(--faint);cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn.sm{width:auto;padding:11px 18px;font-size:14px}
.row{display:flex;gap:10px}
.section{margin-bottom:22px}
.section h3{font-family:var(--head);font-size:15px;font-weight:700;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:13px;font-weight:500;font-family:var(--body);padding:8px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.chip.on{color:#fff;border-color:transparent}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;font-family:var(--body)}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.passage{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;line-height:1.7}
.stem{font-family:var(--head);font-weight:600;font-size:17px;margin-bottom:16px;line-height:1.4}
.choice{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px;cursor:pointer;color:var(--text);transition:all .15s;font-size:15px;line-height:1.5}
.choice .ltr{flex:0 0 auto;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:700;font-size:14px;background:rgba(255,255,255,.08);color:var(--muted)}
.choice.sel{border-color:var(--indigo);background:rgba(79,70,229,.12)}
.choice.sel .ltr{background:var(--indigo);color:#fff}
.choice.correct{border-color:var(--success);background:rgba(52,211,153,.12)}
.choice.correct .ltr{background:var(--success);color:#06281e}
.choice.wrong{border-color:var(--error);background:rgba(248,113,113,.12)}
.choice.wrong .ltr{background:var(--error);color:#3a0d0d}
.choice .elim{margin-left:auto;flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--muted);cursor:pointer;font-size:12px}
.choice.eliminated{opacity:.5}
.choice.eliminated .ctext{text-decoration:line-through}
.rationale{background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.25);border-radius:var(--r);padding:16px;margin-top:8px;line-height:1.7;color:var(--muted)}
.rationale em{color:var(--text);font-style:italic}
.passage em,.choice em{font-style:italic}
.bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:16px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--indigo-bright),var(--amber))}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-family:var(--mono);font-size:13px;color:var(--muted)}
.timer{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--text)}
.timer.over{color:var(--error)}
.actions{display:flex;gap:10px;margin-top:18px}
.score-big{font-family:var(--head);font-size:56px;font-weight:800;background:linear-gradient(120deg,var(--indigo-bright),var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center}
.review{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.review summary{cursor:pointer;padding:14px;display:flex;gap:10px;align-items:center;list-style:none}
.review summary::-webkit-details-marker{display:none}
.review .body{padding:0 14px 14px}
.topic{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.hidden{display:none}
.seg{flex:1;font-family:var(--head);font-weight:700;font-size:14px;padding:12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.seg.on{background:var(--indigo);border-color:var(--indigo);color:#fff}
.qimg{width:100%;border-radius:12px;background:#fff;display:block;border:1px solid var(--border)}
.qmap-label{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:22px 0 8px}
.qmap{display:flex;flex-wrap:wrap;gap:6px}
.qcell{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--head);font-weight:700;font-size:13px;cursor:pointer}
.qcell.ans{background:rgba(79,70,229,.18);color:var(--text);border-color:transparent}
.qcell.mk{background:rgba(245,158,11,.2);color:var(--amber);border-color:var(--amber)}
.qcell.cur{background:var(--indigo);color:#fff;border-color:var(--indigo)}
/* College Board Bluebook-style exam chrome */
.exam-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.et-left{font-family:var(--head);font-weight:700;font-size:15px;flex:1}
.et-center{font-family:var(--mono);font-weight:700;font-size:18px;text-align:center}
.et-center.over{color:var(--error)}
.et-right{flex:1;display:flex;justify-content:flex-end}
.exam-qhead{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--border);padding-bottom:12px;margin-bottom:16px}
.qh-left{display:flex;align-items:center;gap:12px}
.qnum{background:#fff;color:#000;font-family:var(--head);font-weight:800;font-size:14px;width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.flag-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:var(--body)}
.flag-btn.on{color:var(--amber)}
.tool-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 11px;color:var(--muted);cursor:pointer;font-size:13px;font-family:var(--body)}
.tool-btn.on{border-color:var(--indigo-bright);color:var(--indigo-bright);background:rgba(79,70,229,.14)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:start}
.split .pane-l{border-right:1px solid var(--border);padding-right:26px}
.split .pane-r{padding-left:26px}
@media(max-width:820px){.split{grid-template-columns:1fr}.split .pane-l{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:18px;margin-bottom:18px}.split .pane-r{padding-left:0}}
.choice .strike{margin-left:auto;flex:0 0 auto;background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;font-size:12px;padding:3px 11px;font-family:var(--head);font-weight:700}
.exam-bottom{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(11,13,20,.94);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px 0;margin-top:24px}
.eb-left{font-family:var(--mono);font-size:12px;color:var(--muted);flex:1}
.eb-right{display:flex;gap:8px;flex:1;justify-content:flex-end}
.navpill{background:var(--text);color:var(--bg);border:none;border-radius:10px;font-family:var(--head);font-weight:700;font-size:13px;padding:9px 16px;cursor:pointer}
.eb-btn{background:var(--indigo);color:#fff;border:none;border-radius:22px;font-family:var(--head);font-weight:700;font-size:14px;padding:9px 24px;cursor:pointer}
.eb-btn.ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.eb-btn:disabled{opacity:.45;cursor:not-allowed}
.linklike{background:none;border:none;color:var(--indigo-bright);cursor:pointer;font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em}
.navpop{position:fixed;left:50%;bottom:72px;transform:translateX(-50%);width:min(460px,92vw);background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:16px;z-index:60;box-shadow:0 14px 44px rgba(0,0,0,.55)}
.navpop h4{font-family:var(--head);font-size:13px;margin-bottom:6px;text-align:center}
.np-legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--muted);margin:4px 0 12px;flex-wrap:wrap}
.np-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:48vh;overflow:auto}
.spr-wrap{margin:14px 0}
.spr-input{width:100%;max-width:260px;padding:13px 14px;font-size:16px;font-family:var(--body,inherit);color:var(--text);background:var(--card,rgba(255,255,255,.04));border:1px solid var(--line,rgba(255,255,255,.12));border-radius:12px;outline:none}
.spr-input:focus{border-color:var(--indigo-bright,#818CF8)}
.spr-input:disabled{opacity:.7}
@media(max-width:600px){.wrap{padding:20px 16px 80px}}
  </style>
</head>
